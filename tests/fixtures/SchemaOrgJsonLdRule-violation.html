<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>JSON-LD schema test page</title>
    <link rel="canonical" href="https://example.invalid/" />
  </head>

  <body>
    <!--
      1. GOOD: A simple and completely valid schema that should PASS.
    -->
    <h1 type="application/ld+json">Simple & Valid Schema</h1>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "My Awesome Site",
        "url": "https://example.invalid/"
      }
    </script>

    <!--
      2. FAIL: An invalid @type (class) that should be flagged.
    -->
    <h1>Invalid Class Type</h1>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "MyTotallyFakeClass",
        "name": "This object has an invalid type"
      }
    </script>

    <!--
      3. FAIL: A valid @type but with an invalid property that should be flagged.
    -->
    <h1>Invalid Property</h1>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "My Awesome Site",
        "url": "https://example.invalid/",
        "myBogusProperty": "This property does not exist in Schema.org"
      }
    </script>

    <!--
      4. FAIL: A schema object missing the required @type property.
    -->
    <h1>Missing @type</h1>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "name": "This object is missing its @type"
      }
    </script>

    <!--
      5. FAIL: A schema with a JSON syntax error (e.g., a trailing comma).
    -->
    <h1>Invalid JSON Syntax</h1>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Site with a syntax error",
        "url": "https://example.invalid/"
      }
    </script>
    <!--
      6. PASS: a top-level @graph, instead of a single object with a @type, is valid.
    -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Person",
            "name": "Jane Doe",
            "url": "https://www.example.invalid"
          },
          {
            "@type": "WebSite",
            "name": "Example Corp",
            "url": "https://www.example.invalid"
          }
        ]
      }
    </script>

    <!--
      7. PASS: SearchAction with "query-input" property. The "-input" suffix is a
      Schema.org Actions annotation convention (schema.org/docs/actions.html Part 4)
      that applies to any known property; "query" is a valid property, so "query-input"
      must be accepted.
    -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org/",
        "@type": "WebSite",
        "name": "MySite",
        "url": "https://mysite.com",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "{search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>

    <!--
      8. FAIL: "-input" annotation where the base property ("bogus") is not a valid
      Schema.org property.
    -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SearchAction",
        "bogus-input": "this base property does not exist"
      }
    </script>

    <!--
      9. FAIL: "-input" annotation on a top-level non-Action type. The -input/-output
      convention (schema.org/docs/actions.html Part 4) is only valid within the
      property graph of an Action or its subtypes. "query" is a valid property, but
      "query-input" on a bare WebSite (outside any Action context) must be rejected.
    -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "query-input": "this annotation is outside any Action context"
      }
    </script>
  </body>
</html>
